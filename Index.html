<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health Web App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tab-button[aria-selected="true"] { background: #0f766e; color: #ffffff; }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }
      .field-label { display: block; font-size: 0.8rem; font-weight: 650; color: #334155; margin-bottom: 0.3rem; }
      .field-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.65rem 0.75rem; outline: none; background: #ffffff; }
      .field-input:focus { border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15); }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto max-w-5xl px-4 py-3">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h1 class="text-lg font-bold text-teal-800">Health Web App</h1>
            <p class="text-xs text-slate-500">บันทึกสุขภาพ นัดหมาย และข้อมูลแพทย์</p>
          </div>
          <div class="flex gap-2">
            <button onclick="exportData()" class="rounded-lg border border-teal-700 px-3 py-2 text-sm font-semibold text-teal-800">Export</button>
            <button onclick="document.getElementById('importFile').click()" class="rounded-lg bg-teal-700 px-3 py-2 text-sm font-semibold text-white">Import</button>
            <input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)">
          </div>
        </div>
        <nav class="mt-3 grid grid-cols-4 gap-2 text-sm">
          <button class="tab-button rounded-lg px-2 py-2 font-semibold" aria-selected="true" onclick="showTab('dashboard', this)">หน้าแรก</button>
          <button class="tab-button rounded-lg px-2 py-2 font-semibold" onclick="showTab('form', this)">บันทึก</button>
          <button class="tab-button rounded-lg px-2 py-2 font-semibold" onclick="showTab('records', this)">ข้อมูล</button>
          <button class="tab-button rounded-lg px-2 py-2 font-semibold" onclick="showTab('timeline', this)">Timeline</button>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-5">
      <section id="dashboard" class="tab-panel active space-y-5">
        <div id="statusBox" class="rounded-lg border border-teal-100 bg-teal-50 p-3 text-sm text-teal-900"></div>
        <div id="appointmentAlerts" class="space-y-3"></div>
        <div class="grid gap-4 md:grid-cols-3">
          <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h2 class="font-bold text-slate-800">Logs ล่าสุด</h2>
            <div id="summaryLogs" class="mt-3 space-y-2 text-sm"></div>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h2 class="font-bold text-slate-800">Metrics ล่าสุด</h2>
            <div id="summaryMetrics" class="mt-3 space-y-2 text-sm"></div>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h2 class="font-bold text-slate-800">Appointments ล่าสุด</h2>
            <div id="summaryAppointments" class="mt-3 space-y-2 text-sm"></div>
          </div>
        </div>
      </section>

      <section id="form" class="tab-panel">
        <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
          <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <h2 class="text-base font-bold text-slate-800">บันทึก / แก้ไขข้อมูล</h2>
              <p class="text-sm text-slate-500">ข้อมูลจะถูกเก็บไว้ในเบราว์เซอร์ของเครื่องนี้</p>
            </div>
            <label class="block">
              <span class="field-label">ประเภทข้อมูล</span>
              <select id="sheetSelect" class="field-input" onchange="resetForm()"></select>
            </label>
          </div>
          <form id="recordForm" class="grid gap-3 sm:grid-cols-2" onsubmit="submitRecord(event)"></form>
          <div class="mt-4 flex flex-wrap gap-2">
            <button type="submit" form="recordForm" class="rounded-lg bg-teal-700 px-4 py-2 text-sm font-semibold text-white">บันทึกข้อมูล</button>
            <button type="button" onclick="resetForm()" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700">ล้างฟอร์ม</button>
          </div>
        </div>
      </section>

      <section id="records" class="tab-panel space-y-4">
        <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
          <div class="mb-3 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
            <h2 class="text-base font-bold text-slate-800">ข้อมูลทั้งหมด</h2>
            <label class="block">
              <span class="field-label">เลือกตาราง</span>
              <select id="recordsSheetSelect" class="field-input" onchange="renderRecordsTable()"></select>
            </label>
          </div>
          <div id="recordsTable" class="overflow-x-auto"></div>
        </div>
      </section>

      <section id="timeline" class="tab-panel">
        <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
          <h2 class="text-base font-bold text-slate-800">Symptom Timeline</h2>
          <p class="mb-4 text-sm text-slate-500">เรียงจากอาการล่าสุด เพื่อใช้คุยกับแพทย์</p>
          <div id="symptomTimeline" class="space-y-3"></div>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = 'health-web-app-v1';
      const SUMMARY_LIMIT = 5;

      const schemas = {
        User_Logs: ['ID', 'Log_Date', 'Category', 'Symptom', 'Severity', 'Notes', 'Created_At', 'Updated_At'],
        Health_Metrics: ['ID', 'Metric_Date', 'Weight', 'Blood_Sugar', 'Blood_Pressure', 'Heart_Rate', 'Notes', 'Created_At', 'Updated_At'],
        Doctor_Consultations: ['ID', 'Visit_Date', 'Doctor_Name', 'Hospital', 'Diagnosis', 'Medication', 'Lab_Result_URL', 'Notes', 'Created_At', 'Updated_At'],
        Appointments: ['ID', 'Appointment_Date', 'Appointment_Time', 'Doctor_Name', 'Hospital', 'Purpose', 'Status', 'Preparation_Notes', 'Prep_Start_Date', 'Prep_End_Date', 'Created_At', 'Updated_At'],
      };

      const sheetLabels = {
        User_Logs: 'บันทึกอาการ',
        Health_Metrics: 'ค่าสุขภาพ',
        Doctor_Consultations: 'พบแพทย์ / ผลตรวจ',
        Appointments: 'นัดหมาย',
      };

      const fieldLabels = {
        Log_Date: 'วันที่บันทึก',
        Category: 'ประเภท',
        Symptom: 'อาการ / ผลข้างเคียง',
        Severity: 'ระดับความรุนแรง',
        Notes: 'รายละเอียด',
        Metric_Date: 'วันที่วัดค่า',
        Weight: 'น้ำหนัก',
        Blood_Sugar: 'น้ำตาลในเลือด',
        Blood_Pressure: 'ความดัน',
        Heart_Rate: 'ชีพจร',
        Visit_Date: 'วันที่พบแพทย์',
        Doctor_Name: 'แพทย์',
        Hospital: 'โรงพยาบาล',
        Diagnosis: 'ผลวินิจฉัย',
        Medication: 'ยา',
        Lab_Result_URL: 'URL รูปผลแล็บ Google Drive',
        Appointment_Date: 'วันที่นัด',
        Appointment_Time: 'เวลา',
        Purpose: 'จุดประสงค์',
        Status: 'สถานะ',
        Preparation_Notes: 'สิ่งที่ต้องเตรียม',
        Prep_Start_Date: 'เริ่มเตรียมตัว',
        Prep_End_Date: 'สิ้นสุดช่วงเตรียมตัว',
      };

      const hiddenFields = ['ID', 'Created_At', 'Updated_At'];
      let editing = null;
      let appData = createEmptyData();

      document.addEventListener('DOMContentLoaded', () => {
        appData = loadData();
        setupSelectors();
        renderAll();
      });

      function createEmptyData() {
        return Object.keys(schemas).reduce((data, sheetName) => {
          data[sheetName] = [];
          return data;
        }, {});
      }

      function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createEmptyData();

        try {
          return Object.assign(createEmptyData(), JSON.parse(raw));
        } catch (error) {
          setStatus('อ่านข้อมูลเดิมไม่ได้ กรุณา import backup ใหม่');
          return createEmptyData();
        }
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      }

      function setupSelectors() {
        ['sheetSelect', 'recordsSheetSelect'].forEach((id) => {
          const select = document.getElementById(id);
          const current = select.value;
          select.innerHTML = Object.keys(schemas)
            .map((sheet) => `<option value="${sheet}">${sheetLabels[sheet]}</option>`)
            .join('');
          if (current) select.value = current;
        });
      }

      function renderAll() {
        renderDynamicForm();
        renderDashboard();
        renderRecordsTable();
        renderTimeline();
        setStatus('พร้อมใช้งานบน GitHub Pages ข้อมูลถูกเก็บในเบราว์เซอร์นี้');
      }

      function showTab(tabId, button) {
        document.querySelectorAll('.tab-panel').forEach((panel) => panel.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.tab-button').forEach((tab) => tab.setAttribute('aria-selected', 'false'));
        button.setAttribute('aria-selected', 'true');
      }

      function renderDashboard() {
        renderAlerts();
        renderSummary('summaryLogs', takeLatest(appData.User_Logs, 'Log_Date'), (item) => `${item.Log_Date || '-'} · ${item.Symptom || item.Category || '-'}`);
        renderSummary('summaryMetrics', takeLatest(appData.Health_Metrics, 'Metric_Date'), (item) => `${item.Metric_Date || '-'} · น้ำตาล ${item.Blood_Sugar || '-'} · ความดัน ${item.Blood_Pressure || '-'}`);
        renderSummary('summaryAppointments', takeLatest(appData.Appointments, 'Appointment_Date'), (item) => `${item.Appointment_Date || '-'} ${formatTime24(item.Appointment_Time)} · ${item.Purpose || '-'}`);
      }

      function renderAlerts() {
        const box = document.getElementById('appointmentAlerts');
        const active = getActiveAppointmentAlerts();
        if (!active.length) {
          box.innerHTML = '';
          return;
        }

        box.innerHTML = active.map((item) => `
          <article class="rounded-lg border ${item.Should_Prepare ? 'border-amber-300 bg-amber-50' : 'border-teal-200 bg-white'} p-4 shadow-sm">
            <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
              <h2 class="font-bold text-slate-900">${escapeHtml(item.Purpose || 'นัดหมาย')}</h2>
              <span class="text-sm font-semibold text-teal-800">${escapeHtml(item.Appointment_Date || '-')} ${escapeHtml(formatTime24(item.Appointment_Time))}</span>
            </div>
            <p class="mt-1 text-sm text-slate-600">${escapeHtml(item.Doctor_Name || '-')} · ${escapeHtml(item.Hospital || '-')}</p>
            <div class="mt-3">
              <p class="text-sm font-semibold text-slate-800">${item.Should_Prepare ? 'ถึงช่วงเตรียมตัวแล้ว' : 'รายการเตรียมตัว'}</p>
              <ul class="mt-2 list-disc space-y-1 pl-5 text-sm text-slate-700">
                ${(item.Preparation_List || []).map((prep) => `<li>${escapeHtml(prep)}</li>`).join('')}
              </ul>
            </div>
          </article>
        `).join('');
      }

      function renderSummary(targetId, records, format) {
        const target = document.getElementById(targetId);
        if (!records.length) {
          target.innerHTML = '<p class="text-slate-400">ยังไม่มีข้อมูล</p>';
          return;
        }
        target.innerHTML = records
          .map((item) => `<div class="rounded-md bg-slate-50 p-2">${escapeHtml(format(item))}</div>`)
          .join('');
      }

      function renderDynamicForm(record = null) {
        const sheetName = document.getElementById('sheetSelect').value || Object.keys(schemas)[0];
        const form = document.getElementById('recordForm');
        const source = record || {};

        form.innerHTML = schemas[sheetName]
          .filter((header) => !hiddenFields.includes(header))
          .map((header) => renderField(header, source[header]))
          .join('');
      }

      function renderField(header, value = '') {
        const label = fieldLabels[header] || header;
        const type = header.includes('Date') ? 'date' : header.includes('Time') ? 'time' : 'text';
        const isTextarea = ['Notes', 'Symptom', 'Diagnosis', 'Medication', 'Preparation_Notes'].includes(header);

        if (header === 'Status') {
          return `
            <label class="block">
              <span class="field-label">${label}</span>
              <select name="${header}" class="field-input">
                ${['Active', 'Completed', 'Cancelled'].map((status) => `<option value="${status}" ${status === value ? 'selected' : ''}>${status}</option>`).join('')}
              </select>
            </label>
          `;
        }

        if (isTextarea) {
          return `<label class="block sm:col-span-2"><span class="field-label">${label}</span><textarea name="${header}" class="field-input min-h-24">${escapeHtml(value)}</textarea></label>`;
        }

        const timeAttrs = type === 'time' ? ' step="60" inputmode="numeric"' : '';
        return `<label class="block"><span class="field-label">${label}</span><input name="${header}" value="${escapeHtml(value)}" type="${type}"${timeAttrs} class="field-input"></label>`;
      }

      function submitRecord(event) {
        event.preventDefault();
        const sheetName = document.getElementById('sheetSelect').value;
        const payload = Object.fromEntries(new FormData(document.getElementById('recordForm')).entries());
        const now = new Date().toISOString();

        if (editing) {
          const rows = appData[sheetName];
          const index = rows.findIndex((item) => item.ID === editing.ID);
          if (index >= 0) {
            rows[index] = Object.assign({}, rows[index], payload, { Updated_At: now });
          }
        } else {
          appData[sheetName].push(Object.assign({}, payload, {
            ID: createId(),
            Created_At: now,
            Updated_At: now,
          }));
        }

        saveData();
        resetForm();
        renderAll();
        setStatus('บันทึกสำเร็จ');
      }

      function resetForm() {
        editing = null;
        renderDynamicForm();
      }

      function renderRecordsTable() {
        const sheetName = document.getElementById('recordsSheetSelect').value || Object.keys(schemas)[0];
        const headers = schemas[sheetName];
        const rows = appData[sheetName] || [];
        const target = document.getElementById('recordsTable');

        if (!rows.length) {
          target.innerHTML = '<p class="py-4 text-sm text-slate-400">ยังไม่มีข้อมูลในตารางนี้</p>';
          return;
        }

        target.innerHTML = `
          <table class="min-w-full border-separate border-spacing-y-2 text-left text-sm">
            <thead>
              <tr>${headers.map((h) => `<th class="whitespace-nowrap px-2 py-1 text-xs text-slate-500">${escapeHtml(fieldLabels[h] || h)}</th>`).join('')}<th class="px-2 py-1"></th></tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr class="bg-slate-50">
                  ${headers.map((h) => `<td class="max-w-48 whitespace-nowrap px-2 py-2 align-top text-slate-700">${renderCell(row[h], h)}</td>`).join('')}
                  <td class="whitespace-nowrap px-2 py-2 align-top">
                    <button class="mr-2 rounded-md bg-slate-800 px-2 py-1 text-xs font-semibold text-white" onclick="editRecord('${sheetName}', '${row.ID}')">แก้ไข</button>
                    <button class="rounded-md bg-rose-600 px-2 py-1 text-xs font-semibold text-white" onclick="deleteRecord('${sheetName}', '${row.ID}')">ลบ</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function renderCell(value, header = '') {
        if (header.includes('Time')) {
          return escapeHtml(formatTime24(value));
        }

        const text = escapeHtml(value || '');
        if (String(value || '').startsWith('http')) {
          return `<a class="font-semibold text-teal-700 underline" href="${text}" target="_blank" rel="noopener">เปิดไฟล์</a>`;
        }
        return text;
      }

      function formatTime24(value) {
        if (!value) return '';
        const text = String(value).trim();
        const amPmMatch = text.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(AM|PM)$/i);
        if (amPmMatch) {
          let hour = Number(amPmMatch[1]);
          const minute = amPmMatch[2];
          const period = amPmMatch[3].toUpperCase();
          if (period === 'PM' && hour < 12) hour += 12;
          if (period === 'AM' && hour === 12) hour = 0;
          return `${String(hour).padStart(2, '0')}:${minute}`;
        }

        const timeMatch = text.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
        if (timeMatch) {
          const hour = Math.min(Number(timeMatch[1]), 23);
          return `${String(hour).padStart(2, '0')}:${timeMatch[2]}`;
        }

        const date = new Date(text);
        if (!Number.isNaN(date.getTime())) {
          return date.toLocaleTimeString('th-TH', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
          });
        }

        return text;
      }

      function editRecord(sheetName, id) {
        const record = (appData[sheetName] || []).find((item) => String(item.ID) === String(id));
        if (!record) return;

        editing = record;
        document.getElementById('sheetSelect').value = sheetName;
        renderDynamicForm(record);
        showTab('form', document.querySelectorAll('.tab-button')[1]);
      }

      function deleteRecord(sheetName, id) {
        if (!confirm('ลบรายการนี้ใช่ไหม?')) return;
        appData[sheetName] = appData[sheetName].filter((item) => String(item.ID) !== String(id));
        saveData();
        renderAll();
        setStatus('ลบข้อมูลแล้ว');
      }

      function renderTimeline() {
        const target = document.getElementById('symptomTimeline');
        const rows = takeLatest(appData.User_Logs, 'Log_Date', 50).filter((item) => item.Symptom || item.Notes);
        if (!rows.length) {
          target.innerHTML = '<p class="text-sm text-slate-400">ยังไม่มีบันทึกอาการ</p>';
          return;
        }

        target.innerHTML = rows.map((item) => `
          <article class="border-l-4 border-teal-600 bg-slate-50 p-3">
            <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
              <h3 class="font-semibold text-slate-900">${escapeHtml(item.Symptom || item.Category || 'อาการ')}</h3>
              <span class="text-xs font-semibold text-slate-500">${escapeHtml(item.Log_Date || '-')}</span>
            </div>
            <p class="mt-1 text-sm text-slate-600">ระดับ: ${escapeHtml(item.Severity || '-')}</p>
            <p class="mt-2 text-sm text-slate-700">${escapeHtml(item.Notes || '')}</p>
          </article>
        `).join('');
      }

      function getActiveAppointmentAlerts() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        return (appData.Appointments || [])
          .filter((appointment) => String(appointment.Status || '').toLowerCase() === 'active')
          .map((appointment) => {
            const prepStart = parseDate(appointment.Prep_Start_Date);
            const prepEnd = parseDate(appointment.Prep_End_Date);
            const appointmentDate = parseDate(appointment.Appointment_Date);
            const shouldPrepare = isWithinDateRange(today, prepStart, prepEnd) || isWithinUpcomingDays(today, appointmentDate, 7);

            return Object.assign({}, appointment, {
              Should_Prepare: shouldPrepare,
              Preparation_List: splitPreparation(appointment.Preparation_Notes),
            });
          })
          .sort((a, b) => new Date(a.Appointment_Date || 0) - new Date(b.Appointment_Date || 0));
      }

      function exportData() {
        const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `health-web-app-backup-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(url);
      }

      function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = JSON.parse(reader.result);
            appData = Object.assign(createEmptyData(), imported);
            saveData();
            renderAll();
            setStatus('Import ข้อมูลสำเร็จ');
          } catch (error) {
            setStatus('Import ไม่สำเร็จ ไฟล์ต้องเป็น JSON backup ของแอปนี้');
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      }

      function takeLatest(records, dateField, limit = SUMMARY_LIMIT) {
        return records
          .slice()
          .sort((a, b) => new Date(b[dateField] || b.Updated_At || 0) - new Date(a[dateField] || a.Updated_At || 0))
          .slice(0, limit);
      }

      function createId() {
        const stamp = new Date().toISOString().replace(/\D/g, '');
        return `${stamp}-${Math.floor(Math.random() * 10000)}`;
      }

      function parseDate(value) {
        if (!value) return null;
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return null;
        date.setHours(0, 0, 0, 0);
        return date;
      }

      function isWithinDateRange(today, start, end) {
        if (!start || !end) return false;
        return today >= start && today <= end;
      }

      function isWithinUpcomingDays(today, target, days) {
        if (!target) return false;
        const diffDays = Math.ceil((target.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
        return diffDays >= 0 && diffDays <= days;
      }

      function splitPreparation(notes) {
        const fallback = ['เตรียมบัตรประชาชน/บัตรโรงพยาบาล', 'นำรายการยาเดิมไปด้วย'];
        if (!notes) return fallback;

        return String(notes)
          .split(/\n|,|;/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function setStatus(message) {
        document.getElementById('statusBox').textContent = message;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }
    </script>
  </body>
</html>
